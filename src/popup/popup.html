<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Ufora Shortcuts</title>
        <link rel="stylesheet" href="popup.css" />
    </head>
    <body>
        <header>
            <h2>Ufora Shortcuts</h2>

            <div id="settingsToggle" data-icon="settings">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="settings-icon">
                    <path
                        d="M9.671 4.136a2.34 2.34 0 0 1 4.659 0 2.34 2.34 0 0 0 3.319 1.915 2.34 2.34 0 0 1 2.33 4.033 2.34 2.34 0 0 0 0 3.831 2.34 2.34 0 0 1-2.33 4.033 2.34 2.34 0 0 0-3.319 1.915 2.34 2.34 0 0 1-4.659 0 2.34 2.34 0 0 0-3.32-1.915 2.34 2.34 0 0 1-2.33-4.033 2.34 2.34 0 0 0 0-3.831A2.34 2.34 0 0 1 6.35 6.051a2.34 2.34 0 0 0 3.319-1.915"
                    />
                    <circle cx="12" cy="12" r="3" />
                </svg>

                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="home-icon">
                    <path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8" />
                    <path d="M3 10a2 2 0 0 1 .709-1.528l7-6a2 2 0 0 1 2.582 0l7 6A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                </svg>
            </div>
        </header>
        <!-- <p>Extension is currently <span style="color: rgb(2, 161, 2); font-weight: 500">active</span>.</p> -->

        <main>
            <div class="panel">
                <h3>UI shortcuts:</h3>
                <ul id="uiShortcuts">
                    <li>Loading shortcuts…</li>
                </ul>
            </div>

            <div class="panel">
                <h3>Video shortcuts:</h3>
                <ul id="videoShortcuts">
                    <li>Loading shortcuts…</li>
                </ul>
            </div>

            <div class="panel">
                <h3>Custom shortcuts:</h3>
                <ul id="customShortcuts">
                    <li>Loading shortcuts…</li>
                </ul>
            </div>
        </main>

        <div id="settingsPanel" style="display: none">
            <div class="panel">
                <h3>Settings</h3>
                <div class="settingRow">
                    <label for="altMode">Alt key behavior</label>
                    <select id="altMode">
                        <option value="toggle">Toggle shortcuts with Alt</option>
                        <option value="hold">Hold Alt to show shortcuts</option>
                    </select>
                </div>
                <div class="settingRow">
                    <label><input type="checkbox" id="autoLogin" /> Enable auto login</label>
                </div>
            </div>

            <p style="margin-top: 8px; margin-bottom: 0"><i>Changes will be immediately applied, no refresh needed.</i></p>
        </div>

        <footer>
            <a href="https://buymeacoffee.com/arthura/new-extension-live" target="_blank" style="text-decoration: none; color: inherit">
                <div id="feedback" class="panel">
                    <h3>Give feedback</h3>

                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <path
                            d="M2.992 16.342a2 2 0 0 1 .094 1.167l-1.065 3.29a1 1 0 0 0 1.236 1.168l3.413-.998a2 2 0 0 1 1.099.092 10 10 0 1 0-4.777-4.719"
                        />
                        <path d="M8 12h.01" />
                        <path d="M12 12h.01" />
                        <path d="M16 12h.01" />
                    </svg>
                </div>
            </a>

            <!-- <a href="https://www.buymeacoffee.com/arthura" target="_blank">
                <img src="buymeacoffee.svg" alt="Buy Me a Coffee" class="coffee" />
            </a> -->
        </footer>

        <script src="popup.js"></script>
    </body>
</html>
