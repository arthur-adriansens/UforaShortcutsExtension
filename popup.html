<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Ufora Shortcuts</title>
        <link rel="stylesheet" href="popup.css" />
    </head>
    <body>
        <div class="container">
            <h3>Ufora Shortcuts</h3>
            <p>Extension is currently <span style="color: rgb(2, 161, 2); font-weight: 500">active</span>.</p>

            <p>Video shortcuts:</p>
            <ul>
                <li><strong>Space:</strong> Play / Pause</li>
                <li><strong>Arrow L/R:</strong> Skip 5 seconds</li>
                <li><strong>Arrow U/D:</strong> Volume Control</li>
                <li><strong>F:</strong> Fullscreen Toggle</li>
                <li><strong>M:</strong> Mute Toggle</li>
            </ul>
        </div>

        <script src="popup.js"></script>
    </body>
</html>
